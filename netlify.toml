# Netlify deployment configuration for northwestkingdom.com
# Plain static site — no build step required.

[build]
  publish = "."
  command = ""

# Security and performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Cache headers ──────────────────────────────────────────────────────────────
# IMPORTANT: JS files and nav component HTML are updated regularly.
# Do NOT use "immutable" for any file whose content may change between deploys
# without a filename change. "immutable" tells browsers never to revalidate —
# users would run stale code until they manually clear their browser cache.

# JavaScript — always revalidate so updates take effect on next page load
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Nav component HTML — always revalidate (nav changes when we update them)
[[headers]]
  for = "/assets/components/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS — medium cache (changes less often; 1 hour is safe without content hashing)
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Vendor JS (minified, stable — ok to cache longer but not immutable)
[[headers]]
  for = "/assets/js/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Images and other static assets — cache aggressively (filenames don't change)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# HTML pages — never cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Data files
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Identity-protected routes ─────────────────────────────────────────────────
# Rules are evaluated in order. The first matching rule wins.
# Netlify Identity must be enabled in the dashboard for these to take effect.

# Member area: members and admins may enter; everyone else goes to login.
[[redirects]]
  from = "/member/*"
  to   = "/member/:splat"
  status = 200
  conditions = {Role = ["member", "admin"]}

[[redirects]]
  from = "/member/*"
  to   = "/login/?redirect=/member/:splat"
  status = 302
  force = true

# Admin area: admins only; everyone else goes to login.
[[redirects]]
  from = "/admin/*"
  to   = "/admin/:splat"
  status = 200
  conditions = {Role = ["admin"]}

[[redirects]]
  from = "/admin/*"
  to   = "/login/?redirect=/admin/:splat"
  status = 302
  force = true

# ── Friendly 404 ──────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 404
  force = false
