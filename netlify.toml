# Netlify deployment configuration for northwestkingdom.com
# Plain static site — no build step required.

[build]
  publish = "."
  command = ""

# Security and performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively, HTML never
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Data files (photo metadata JSON) must not be cached — they change as photos are added
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Identity-protected routes ─────────────────────────────────────────────────
# Rules are evaluated in order. The first matching rule wins.
# Netlify Identity must be enabled in the dashboard for these to take effect.

# Member area: members and admins may enter; everyone else goes to login.
[[redirects]]
  from = "/member/*"
  to   = "/member/:splat"
  status = 200
  conditions = {Role = ["member", "admin"]}

[[redirects]]
  from = "/member/*"
  to   = "/login/?redirect=/member/:splat"
  status = 302
  force = true

# Admin area: admins only; everyone else goes to login.
[[redirects]]
  from = "/admin/*"
  to   = "/admin/:splat"
  status = 200
  conditions = {Role = ["admin"]}

[[redirects]]
  from = "/admin/*"
  to   = "/login/?redirect=/admin/:splat"
  status = 302
  force = true

# ── Friendly 404 ──────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 404
  force = false
