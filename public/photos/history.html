<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History Photos -- Northwest Kingdom</title>
  <meta name="description" content="Historical photos of Northwest Kingdom and the surrounding MLC community.">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-section="public">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="site-header"></div>
  <nav id="site-nav" aria-label="Public navigation"></nav>

  <main id="main-content">
    <div class="container page-wrapper">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="/">Home</a></li>
          <li><a href="/public/photos/">Photos</a></li>
          <li><span aria-current="page">History</span></li>
        </ol>
      </nav>

      <div class="page-header">
        <h1>History Photos</h1>
        <p>Historical photos of Northwest Kingdom and the Miccosukee Land Co-op community.</p>
      </div>

      <div class="section-nav" aria-label="Photo galleries">
        <h3>All galleries</h3>
        <ul>
          <li><a href="/public/photos/events.html">Events</a></li>
          <li><a href="/public/photos/land-and-nature.html">Land and Nature</a></li>
          <li><strong>History</strong></li>
          <li><a href="/public/photos/submit-photo.html">Submit a Photo</a></li>
        </ul>
      </div>

      <div id="gallery-filters" class="gallery-filters" aria-label="Filter photos">
        <div class="gallery-filter-group">
          <label for="filter-year">Year</label>
          <select id="filter-year" data-filter="year">
            <option value="">All years</option>
          </select>
        </div>
        <div class="gallery-filter-group gallery-filter-group--search">
          <label for="filter-search">Search</label>
          <input type="search" id="filter-search" data-filter="search"
            placeholder="Caption, tag, decade..." autocomplete="off">
        </div>
      </div>

      <p id="gallery-results-info" class="gallery-results-info" aria-live="polite"></p>
      <p id="gallery-loading" class="text-muted">Loading photos...</p>
      <div id="photo-gallery" data-category="history"></div>

    </div>
  </main>

  <div id="site-footer" role="contentinfo"></div>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/photo-gallery.js"></script>
</body>
</html>
