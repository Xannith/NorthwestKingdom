<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login — Northwest Kingdom</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-section="public">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="site-header"></div>
  <nav id="site-nav" aria-label="Public navigation"></nav>

  <main id="main-content">
    <div class="login-layout">
      <div class="login-box">
        <h1>Member Login</h1>
        <p class="login-subhead">Northwest Kingdom resident access</p>

        <div class="notice mb-lg">
          <strong>Authentication not yet implemented.</strong>
          This is a placeholder login form. See <code>SECURITY_NOTES.md</code> for the authentication roadmap.
        </div>

        <form method="post" action="#" autocomplete="on" aria-label="Member login form">
          <div class="form-field">
            <label class="form-label" for="email">Email address <span class="required" aria-hidden="true">*</span></label>
            <input class="form-input" type="email" id="email" name="email" autocomplete="email" required placeholder="your@email.com">
          </div>
          <div class="form-field">
            <label class="form-label" for="password">Password <span class="required" aria-hidden="true">*</span></label>
            <input class="form-input" type="password" id="password" name="password" autocomplete="current-password" required>
          </div>
          <button class="btn btn--primary btn--full" type="submit">Log In</button>
        </form>

        <div class="login-links">
          <a href="/login/forgot-password.html">Forgot password?</a>
          <a href="/login/request-access.html">Request neighborhood access</a>
          <a href="/login/account-help.html">Account help</a>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer" role="contentinfo"></div>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/main.js"></script>
</body>
</html>
