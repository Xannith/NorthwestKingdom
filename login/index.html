<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login — Northwest Kingdom</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <!-- Identity Widget loaded here (blocking) so window.netlifyIdentity exists
       before identity.js runs. Do NOT move this below the body scripts. -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body data-section="public">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="site-header"></div>
  <nav id="site-nav" aria-label="Public navigation"></nav>

  <main id="main-content">
    <div class="login-layout">
      <div class="login-box">
        <h1>Member Login</h1>
        <p class="login-subhead">Northwest Kingdom resident access</p>

        <!-- Button is visible immediately. identity.js auto-opens the modal
             on page load; this button is the fallback if the user closes it. -->
        <button class="btn btn--primary btn--full mb-lg" id="login-open-btn"
                aria-label="Open login form">
          Open Login Form
        </button>

        <div class="login-links">
          <a href="/login/forgot-password.html">Forgot password?</a>
          <a href="/login/request-access.html">Request neighborhood access</a>
          <a href="/login/account-help.html">Account help</a>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer" role="contentinfo"></div>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/identity.js"></script>
</body>
</html>
