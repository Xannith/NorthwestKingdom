<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login — Northwest Kingdom</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-section="public">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="site-header"></div>
  <nav id="site-nav" aria-label="Public navigation"></nav>

  <main id="main-content">
    <div class="login-layout">
      <div class="login-box">
        <h1>Member Login</h1>
        <p class="login-subhead">Northwest Kingdom resident access</p>

        <p id="login-loading" class="text-muted mb-lg">Opening login form&hellip;</p>

        <button class="btn btn--primary btn--full" id="login-open-btn" hidden
                aria-label="Open login form">
          Open Login Form
        </button>

        <div class="login-links">
          <a href="/login/forgot-password.html">Forgot password?</a>
          <a href="/login/request-access.html">Request neighborhood access</a>
          <a href="/login/account-help.html">Account help</a>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer" role="contentinfo"></div>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/identity.js"></script>
</body>
</html>
