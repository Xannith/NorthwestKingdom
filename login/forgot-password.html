<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Northwest Kingdom</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body data-section="public">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="site-header"></div>
  <nav id="site-nav" aria-label="Public navigation"></nav>

  <main id="main-content">
    <div class="login-layout">
      <div class="login-box">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <ol>
            <li><a href="/">Home</a></li>
            <li><a href="/login/">Login</a></li>
            <li><span aria-current="page">Forgot Password</span></li>
          </ol>
        </nav>

        <h1>Reset Password</h1>
        <p class="login-subhead">Enter your email to receive a reset link.</p>

        <div class="notice" style="margin-bottom:1.5rem;">
          <strong>Authentication not yet implemented.</strong>
          This is a placeholder. Password reset will be handled by the authentication provider once configured.
        </div>

        <form method="post" action="#" aria-label="Password reset form">
          <div class="form-field">
            <label class="form-label" for="email">Email address <span class="required" aria-hidden="true">*</span></label>
            <input class="form-input" type="email" id="email" name="email" autocomplete="email" required placeholder="your@email.com">
          </div>
          <button class="btn btn--primary" type="submit" style="width:100%">Send Reset Link</button>
        </form>

        <div class="login-links">
          <a href="/login/">Back to login</a>
          <a href="/login/account-help.html">Account help</a>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer" role="contentinfo"></div>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/main.js"></script>
</body>
</html>
