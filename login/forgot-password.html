<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Northwest Kingdom</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-section="public" data-no-sidenav="true">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="site-header"></div>
  <nav id="site-nav" aria-label="Public navigation"></nav>

  <main id="main-content">
    <div class="login-layout">
      <div class="login-box">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <ol>
            <li><a href="/">Home</a></li>
            <li><a href="/login/">Login</a></li>
            <li><span aria-current="page">Forgot Password</span></li>
          </ol>
        </nav>

        <h1>Reset Password</h1>
        <p class="login-subhead">Password reset is handled through the login form.</p>

        <p>
          Use the <strong>Forgot password?</strong> link inside the login form to receive a reset email.
        </p>

        <button class="btn btn--primary btn--full mb-lg" id="recovery-btn"
                aria-label="Open password recovery form">
          Open Recovery Form
        </button>

        <div class="login-links">
          <a href="/login/">Back to login</a>
          <a href="/login/account-help.html">Account help</a>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer" role="contentinfo"></div>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/main.js"></script>
  <script>
    document.getElementById('recovery-btn').addEventListener('click', function () {
      if (window.netlifyIdentity) netlifyIdentity.open('recovery');
    });
  </script>
</body>
</html>
